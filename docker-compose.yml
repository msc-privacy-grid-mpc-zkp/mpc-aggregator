version: '3.8'

services:
  # --- SERVER A (Node 0) ---
  server-a:
    build:
      context: ./cloud-aggregator
      dockerfile: Dockerfile
    container_name: server-a
    ports:
      - "8080:8080"
    environment:
      - NODE_ID=0
      - PORT=8080
      - OUTPUT_PATH=/dev/shm/mp-spdz
    volumes:
      - node_a_shm:/dev/shm/mp-spdz
    networks:
      - mpc-network

  mpc-node-a:
    build:
      context: ./mpc-engine
      dockerfile: Dockerfile
      args:
        NUM_METERS: ${NUM_METERS:-10}
        NUM_PARTIES: ${NUM_PARTIES:-3}
    container_name: mpc-node-a
    environment:
      - NODE_ID=0
    volumes:
      - node_a_shm:/dev/shm/mp-spdz
    depends_on:
      - server-a
    networks:
      - mpc-network
    expose:
      - "5000"
      - "5001"
      - "5002"

  # --- SERVER B (Node 1) ---
  server-b:
    build:
      context: ./cloud-aggregator
      dockerfile: Dockerfile
    container_name: server-b
    ports:
      - "8081:8080"
    environment:
      - NODE_ID=1
      - PORT=8080
      - OUTPUT_PATH=/dev/shm/mp-spdz
    volumes:
      - node_b_shm:/dev/shm/mp-spdz
    networks:
      - mpc-network

  mpc-node-b:
    build:
      context: ./mpc-engine
      dockerfile: Dockerfile
      args:
        NUM_METERS: ${NUM_METERS:-10}
        NUM_PARTIES: ${NUM_PARTIES:-3}
    container_name: mpc-node-b
    environment:
      - NODE_ID=1
      - NUM_METERS=${NUM_METERS}
    volumes:
      - node_b_shm:/dev/shm/mp-spdz
    depends_on:
      - server-b
    networks:
      - mpc-network
    expose:
      - "5000"
      - "5001"
      - "5002"

  # --- SERVER C (Node 2) ---
  server-c:
    build:
      context: ./cloud-aggregator
      dockerfile: Dockerfile
    container_name: server-c
    ports:
      - "8082:8080"
    environment:
      - NODE_ID=2
      - PORT=8080
      - OUTPUT_PATH=/dev/shm/mp-spdz
    volumes:
      - node_c_shm:/dev/shm/mp-spdz
    networks:
      - mpc-network

  mpc-node-c:
    build:
      context: ./mpc-engine
      dockerfile: Dockerfile
      args:
        NUM_METERS: ${NUM_METERS:-10}
        NUM_PARTIES: ${NUM_PARTIES:-3}
    container_name: mpc-node-c
    environment:
      - NODE_ID=2
    volumes:
      - node_c_shm:/dev/shm/mp-spdz
    depends_on:
      - server-c
    networks:
      - mpc-network
    expose:
      - "5000"
      - "5001"
      - "5002"

networks:
  mpc-network:
    driver: bridge

volumes:
  node_a_shm:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=64m"
  node_b_shm:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=64m"
  node_c_shm:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=64m"