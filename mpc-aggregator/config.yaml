services:
  server-a:
    image: mpc-aggregator:latest
    ports:
      - "8080:8080"
    volumes:
      - type: tmpfs
        target: /dev/shm/mp-spdz
    environment:
      - SERVER_PORT=8080
      - SERVER_NAME=MPC Node A
      - NODE_ID=0
      - OUTPUT_PATH=/dev/shm/mp-spdz
      - EXPECTED_METERS=50

  server-b:
    image: mpc-aggregator:latest
    ports:
      - "8081:8081"
    volumes:
      - type: tmpfs
        target: /dev/shm/mp-spdz
    environment:
      - SERVER_PORT=8081
      - SERVER_NAME=MPC Node B
      - NODE_ID=1
      - OUTPUT_PATH=/dev/shm/mp-spdz
      - EXPECTED_METERS=50

  server-c:
    image: mpc-aggregator:latest
    ports:
      - "8082:8082"
    volumes:
      - type: tmpfs
        target: /dev/shm/mp-spdz
    environment:
      - SERVER_PORT=8082
      - SERVER_NAME=MPC Node C
      - NODE_ID=2
      - OUTPUT_PATH=/dev/shm/mp-spdz
      - EXPECTED_METERS=50
  mpc:
    scale_factor: 1000